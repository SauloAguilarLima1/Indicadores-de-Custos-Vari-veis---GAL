<!DOCTYPE html>
<html lang="pt-BR" data-mode="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso â€” Indicadores de Custeio Â· GAL</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* === Dark estÃ¡tico â€” mesma temÃ¡tica do dashboard (sem toggle) === */
    :root {
      --bg-base: #050505;
      --text-primary: #f0f1f4;
      --text-secondary: #a8b0bf;
      --text-tertiary: #6b7280;

      --glass-bg-strong: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.07);
      --segment-bg: rgba(0, 0, 0, 0.45);

      --r-md: 14px;
      --r-lg: 20px;
      --r-xl: 28px;

      --shadow-glass:
        0 1px 0 rgba(255, 255, 255, 0.05) inset,
        0 0 0 1px rgba(255, 255, 255, 0.02) inset,
        0 18px 50px -12px rgba(0, 0, 0, 0.7),
        0 4px 16px -4px rgba(0, 0, 0, 0.5);

      --ease-glide: cubic-bezier(0.22, 1, 0.36, 1);
    }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      line-height: 1.5;
      letter-spacing: -0.005em;
      -webkit-font-smoothing: antialiased;
    }

    /* === Atmosphere â€” mesmo fundo radial do dashboard === */
    .atmosphere {
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(ellipse 100% 60% at 50% 0%, rgba(255, 255, 255, 0.02), transparent 70%),
        radial-gradient(ellipse 80% 50% at 50% 100%, rgba(255, 255, 255, 0.015), transparent 70%),
        var(--bg-base);
    }

    .login-wrap {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
    }

    /* Logo com inversÃ£o de cor (idÃªntica ao header do dashboard no dark) */
    .login-logo {
      height: 66px;
      width: auto;
      object-fit: contain;
      filter: brightness(0) invert(1);
      opacity: 0.96;
      user-select: none;
    }

    /* Card central â€” liquid glass */
    .login-card {
      width: 100%;
      background: var(--glass-bg-strong);
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      border: 1px solid var(--glass-border);
      border-radius: var(--r-xl);
      box-shadow: var(--shadow-glass);
      padding: 36px 32px;
    }

    .login-card h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.012em;
      text-align: center;
      margin-bottom: 5px;
    }
    .login-card .sub {
      font-size: 13px;
      color: var(--text-tertiary);
      text-align: center;
      margin-bottom: 30px;
    }

    .field { margin-bottom: 20px; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-tertiary);
      margin-bottom: 9px;
      padding-left: 2px;
    }

    /* === Caixas com contorno de luz LED branca vibrante === */
    @keyframes ledPulse {
      0%, 100% {
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.28),
          0 0 10px rgba(255, 255, 255, 0.16),
          0 0 22px rgba(255, 255, 255, 0.09);
      }
      50% {
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.40),
          0 0 15px rgba(255, 255, 255, 0.26),
          0 0 32px rgba(255, 255, 255, 0.14);
      }
    }
    .field input {
      width: 100%;
      padding: 13px 15px;
      background: var(--segment-bg);
      border: 1px solid rgba(255, 255, 255, 0.55);
      border-radius: var(--r-md);
      color: var(--text-primary);
      font-size: 14.5px;
      font-family: inherit;
      outline: none;
      animation: ledPulse 3.6s ease-in-out infinite;
      transition: border-color 0.25s var(--ease-glide), box-shadow 0.25s var(--ease-glide);
    }
    .field input::placeholder { color: var(--text-tertiary); }
    .field input:focus {
      border-color: #ffffff;
      animation: none;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.75),
        0 0 14px rgba(255, 255, 255, 0.48),
        0 0 30px rgba(255, 255, 255, 0.30),
        0 0 58px rgba(255, 255, 255, 0.16);
    }

    .btn {
      width: 100%;
      margin-top: 8px;
      padding: 14px;
      background: #ffffff;
      color: #050505;
      border: none;
      border-radius: var(--r-md);
      font-weight: 600;
      font-size: 14.5px;
      cursor: pointer;
      box-shadow: 0 0 18px rgba(255, 255, 255, 0.22);
      transition: transform 0.2s var(--ease-glide), box-shadow 0.2s var(--ease-glide), opacity 0.2s;
    }
    .btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 0 30px rgba(255, 255, 255, 0.42); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }

    .erro {
      background: rgba(248, 113, 113, 0.12);
      border: 1px solid rgba(248, 113, 113, 0.40);
      color: #fca5a5;
      padding: 11px 14px;
      border-radius: var(--r-md);
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }
    .erro.show { display: block; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .rodape {
      text-align: center;
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="atmosphere"></div>

  <div class="login-wrap">
    <img class="login-logo" id="loginLogo" alt="Grupo Aguilar Lima">

    <div class="login-card">
      <h1>Indicadores de Custeio</h1>
      <p class="sub">Acesso restrito â€” Grupo Aguilar Lima</p>

      <div id="erro" class="erro" role="alert"></div>

      <form id="form-login" autocomplete="on">
        <div class="field">
          <label for="username">UsuÃ¡rio</label>
          <input type="text" id="username" name="username" autocomplete="username" required autofocus>
        </div>
        <div class="field">
          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn" id="btn-entrar">Entrar</button>
      </form>

      <p class="rodape">Esqueceu a senha? Fale com o administrador.</p>
    </div>
  </div>

      const tokenSalvo = localStorage.getItem('gal_session_token');
      if(tokenSalvo){
        supa.rpc('get_dashboard_data', { p_token: tokenSalvo }).then(({ error }) => {
          if(!error){ window.location.replace('./index.html'); }
          else { localStorage.removeItem('gal_session_token'); }
        });
      }

      document.getElementById('form-login').addEventListener('submit', async (e) => {
        e.preventDefault();
        esconderErro();
        const btn = document.getElementById('btn-entrar');
        const username = document.getElementById('username').value.trim();
        const senha = document.getElementById('senha').value;
        if(!username || !senha){ mostrarErro('Preencha usuÃ¡rio e senha.'); return; }

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>Entrando...';

        try {
          const { data, error } = await supa.rpc('login', { p_username: username, p_senha: senha });
          if(error) throw error;
          if(!data || !data.success){ mostrarErro(data?.erro || 'Falha ao entrar.'); return; }
          localStorage.setItem('gal_session_token', data.token);
          window.location.replace('./index.html');
        } catch(err){
          console.error(err);
          mostrarErro('Erro de comunicaÃ§Ã£o com o servidor. Tente novamente.');
        } finally {
          btn.disabled = false;
          btn.textContent = 'Entrar';
        }
      });

      function mostrarErro(msg){ const el = document.getElementById('erro'); el.textContent = msg; el.classList.add('show'); }
      function esconderErro(){ document.getElementById('erro').classList.remove('show'); }
    })();
  </script>
</body>
</html>
