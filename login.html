<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Indicadores de Custos GAL</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js"></script>
  <style>
    :root {
      --primary:#1a3a52; --primary-dark:#0f2438; --secondary:#d4a574;
      --accent:#ef6461; --bg:#f5f7fa; --bg-soft:#eef2f5; --card:#fff;
      --text:#2c3e50; --text-muted:#7f8c8d; --border:#e8ecf1;
      --shadow:0 2px 8px rgba(0,0,0,.08); --shadow-lg:0 8px 32px rgba(0,0,0,.12);
      --radius:14px; --radius-sm:8px;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
      background:linear-gradient(135deg,var(--primary),var(--primary-dark));
      color:var(--text); min-height:100vh;
      display:flex; align-items:center; justify-content:center;
      padding:1.5rem;
    }
    .login-card{
      background:rgba(255,255,255,.96);
      backdrop-filter:blur(12px);
      border-radius:var(--radius);
      box-shadow:var(--shadow-lg);
      padding:2.5rem 2.25rem;
      width:100%; max-width:380px;
    }
    .brand{text-align:center; margin-bottom:1.75rem}
    .brand h1{font-size:1.25rem; color:var(--primary); font-weight:600; margin-bottom:.35rem}
    .brand p{font-size:.85rem; color:var(--text-muted)}
    .field{margin-bottom:1rem}
    .field label{
      display:block; font-size:.78rem; font-weight:700;
      color:var(--text-muted); text-transform:uppercase; letter-spacing:.5px;
      margin-bottom:.4rem;
    }
    .field input{
      width:100%; padding:.7rem .9rem;
      border:2px solid var(--border); border-radius:var(--radius-sm);
      font-size:.95rem; font-family:inherit; color:var(--text);
      background:#fff; transition:border-color .15s;
    }
    .field input:focus{outline:none; border-color:var(--primary)}
    .field input:disabled{background:var(--bg-soft); cursor:not-allowed}
    .btn{
      width:100%; background:var(--secondary); color:var(--primary-dark);
      border:none; padding:.8rem; border-radius:var(--radius-sm);
      font-weight:700; font-size:.95rem; cursor:pointer;
      transition:transform .15s, box-shadow .15s, opacity .15s;
      margin-top:.5rem;
    }
    .btn:hover:not(:disabled){transform:translateY(-1px); box-shadow:var(--shadow)}
    .btn:disabled{opacity:.6; cursor:not-allowed}
    .erro{
      background:#fde8e8; color:#9b2c2c;
      padding:.7rem .9rem; border-radius:var(--radius-sm);
      font-size:.85rem; margin-bottom:1rem;
      border-left:4px solid var(--accent);
      display:none;
    }
    .erro.show{display:block}
    .spinner{
      display:inline-block; width:14px; height:14px;
      border:2px solid currentColor; border-top-color:transparent;
      border-radius:50%; animation:spin .7s linear infinite;
      vertical-align:middle; margin-right:.5rem;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .rodape{text-align:center; font-size:.75rem; color:var(--text-muted); margin-top:1.25rem}
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand">
      <h1>Indicadores de Custos GAL</h1>
      <p>Acesso restrito — Grupo Aguilar Lima</p>
    </div>

    <div id="erro" class="erro" role="alert"></div>

    <form id="form-login" autocomplete="on">
      <div class="field">
        <label for="username">Usuário</label>
        <input type="text" id="username" name="username" autocomplete="username" required autofocus>
      </div>
      <div class="field">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn" id="btn-entrar">Entrar</button>
    </form>

    <p class="rodape">Esqueceu a senha? Fale com o administrador.</p>
  </div>

  <script>
    (function(){
      const cfg = window.SUPABASE_CONFIG;
      if(!cfg || cfg.url.includes('SEU-PROJETO') || cfg.anonKey.includes('COLE_AQUI')){
        mostrarErro('Configuração do Supabase ainda não foi preenchida em config.js.');
        document.getElementById('btn-entrar').disabled = true;
        return;
      }

      const supa = window.supabase.createClient(cfg.url, cfg.anonKey);

      // Se já tem sessão válida no localStorage, pula login.
      const tokenSalvo = localStorage.getItem('gal_session_token');
      if(tokenSalvo){
        // Valida a sessão tentando buscar dados; se bater redireciona, se falhar limpa.
        supa.rpc('get_dashboard_data', { p_token: tokenSalvo }).then(({ error }) => {
          if(!error){ window.location.replace('./index.html'); }
          else { localStorage.removeItem('gal_session_token'); }
        });
      }

      document.getElementById('form-login').addEventListener('submit', async (e) => {
        e.preventDefault();
        esconderErro();
        const btn = document.getElementById('btn-entrar');
        const username = document.getElementById('username').value.trim();
        const senha = document.getElementById('senha').value;

        if(!username || !senha){ mostrarErro('Preencha usuário e senha.'); return; }

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>Entrando...';

        try {
          const { data, error } = await supa.rpc('login', { p_username: username, p_senha: senha });
          if(error) throw error;
          if(!data || !data.success){
            mostrarErro(data?.erro || 'Falha ao entrar.');
            return;
          }
          localStorage.setItem('gal_session_token', data.token);
          window.location.replace('./index.html');
        } catch(err){
          console.error(err);
          mostrarErro('Erro de comunicação com o servidor. Tente novamente.');
        } finally {
          btn.disabled = false;
          btn.textContent = 'Entrar';
        }
      });

      function mostrarErro(msg){
        const el = document.getElementById('erro');
        el.textContent = msg;
        el.classList.add('show');
      }
      function esconderErro(){
        document.getElementById('erro').classList.remove('show');
      }
    })();
  </script>
</body>
</html>
