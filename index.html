<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indicadores de Custos Variáveis - GAL</title>
  <script src="https://cdn.plot.ly/plotly-2.26.0.min.js"></script>
  <style>
    :root {
      --primary:#1a3a52;--primary-dark:#0f2438;--secondary:#d4a574;--accent:#ef6461;
      --success:#4caf50;--warn:#e6a700;
      --terra-boa:#2d5a3d;--pedra-torta:#5dade2;--resende:#3a8a7e;--vira-canoa:#d97947;
      --cafe:#D2691E;--energia:#E6B800;--lavanderia:#4169E1;--agua:#00CED1;
      --bg:#f5f7fa;--bg-soft:#eef2f5;--card:#fff;--text:#2c3e50;--text-muted:#7f8c8d;
      --border:#e8ecf1;--shadow:0 2px 8px rgba(0,0,0,.08);--shadow-lg:0 4px 16px rgba(0,0,0,.1);
      --radius:10px;--radius-sm:6px;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:linear-gradient(135deg,var(--bg),var(--bg-soft));color:var(--text);min-height:100vh;line-height:1.5}
    .header{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;padding:1.4rem 2rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1.5rem;box-shadow:var(--shadow)}
    .header-brand{display:flex;align-items:center;gap:1.2rem}
    .header-logo{height:50px;width:auto}
    .header-text h1{font-size:1.4rem;font-weight:600}
    .header-text p{opacity:.85;font-size:.85rem;margin-top:.2rem}
    .header-actions{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
    .btn{background:var(--secondary);color:var(--primary-dark);border:none;padding:.6rem 1.2rem;border-radius:var(--radius-sm);font-weight:600;font-size:.9rem;cursor:pointer;transition:transform .15s,box-shadow .15s}
    .btn:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
    .updated{font-size:.85rem;opacity:.9}
    .filter-bar{background:#fff;padding:.9rem 2rem;display:flex;align-items:center;gap:1.5rem;border-bottom:1px solid var(--border);flex-wrap:wrap}
    .filter-group{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap}
    .filter-label{font-size:.78rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}
    .year-pills{display:flex;gap:.4rem}
    .year-pill{background:transparent;border:2px solid var(--border);color:var(--text-muted);padding:.4rem .95rem;border-radius:999px;font-weight:600;font-size:.88rem;cursor:pointer;transition:all .15s}
    .year-pill:hover{border-color:var(--secondary);color:var(--text)}
    .year-pill.active{background:var(--primary);border-color:var(--primary);color:#fff}
    .year-pill .partial-badge{display:inline-block;margin-left:.4rem;background:var(--warn);color:#fff;font-size:.65rem;padding:.1rem .4rem;border-radius:999px;font-weight:700}
    .month-select{padding:.4rem .7rem;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:.88rem;background:#fff;color:var(--text);cursor:pointer;font-family:inherit}
    .month-select:focus{outline:none;border-color:var(--primary)}
    .reset-link{font-size:.82rem;color:var(--primary);cursor:pointer;text-decoration:underline;background:none;border:none}
    .tabs{background:#fff;border-bottom:3px solid var(--secondary);display:flex;flex-wrap:wrap;overflow-x:auto;padding:0 1rem}
    .tab{background:transparent;border:none;color:var(--text);padding:1rem 1.4rem;font-size:.95rem;font-weight:500;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-3px;white-space:nowrap;transition:color .15s,border-color .15s}
    .tab:hover{color:var(--secondary)}
    .tab.active{color:var(--secondary);border-bottom-color:var(--secondary);font-weight:600}
    .container{max-width:1400px;margin:0 auto;padding:2rem}
    .panel-header{display:flex;align-items:center;gap:1.5rem;margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid var(--border);flex-wrap:wrap}
    .panel-logo{max-height:70px;max-width:180px}
    .panel-title-block h2{font-size:1.5rem;font-weight:600;color:var(--primary)}
    .panel-title-block p{font-size:.9rem;color:var(--text-muted);margin-top:.2rem}
    .banner{background:#fff8e6;border-left:4px solid var(--warn);padding:.9rem 1.2rem;border-radius:var(--radius-sm);margin-bottom:1.5rem;font-size:.92rem}
    .banner strong{color:var(--primary)}
    .section-subtitle{font-size:1.05rem;font-weight:600;color:var(--primary);margin:2rem 0 1rem;padding-bottom:.5rem;border-bottom:2px solid var(--border)}
    .toggle-group{display:inline-flex;border:2px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
    .toggle-btn{background:transparent;border:none;color:var(--text-muted);padding:.35rem .9rem;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .15s;border-right:1px solid var(--border)}
    .toggle-btn:last-child{border-right:none}
    .toggle-btn:hover{color:var(--text);background:#f5f5f5}
    .toggle-btn.active{background:var(--primary);color:#fff}
    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem;margin-bottom:2rem}
    .kpi-card{background:var(--card);border-radius:var(--radius-sm);padding:1.2rem 1.3rem;box-shadow:var(--shadow);border-left:4px solid var(--accent-color,var(--secondary));transition:transform .15s,box-shadow .15s}
    .kpi-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
    .kpi-label{font-size:.78rem;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:.5rem}
    .kpi-value{font-size:1.6rem;font-weight:700;color:var(--primary);line-height:1.2}
    .kpi-yoy{font-size:.82rem;margin-top:.4rem;font-weight:600}
    .kpi-yoy.up{color:var(--accent)}.kpi-yoy.down{color:var(--success)}.kpi-yoy.neutral{color:var(--text-muted)}
    .charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(550px,1fr));gap:1.5rem;margin-bottom:2rem}
    .chart-card{background:var(--card);border-radius:var(--radius);padding:1.4rem;box-shadow:var(--shadow);border-top:3px solid var(--accent-color,var(--secondary))}
    .chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem}
    .chart-title{font-size:1.05rem;font-weight:600;color:var(--primary)}
    .chart-container{width:100%;height:360px}
    .costs-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem;margin-bottom:2rem}
    .cost-card{background:var(--card);border-radius:var(--radius-sm);padding:1.1rem 1.3rem;box-shadow:var(--shadow);border-left:4px solid}
    .cost-label{font-size:.85rem;color:var(--text-muted);font-weight:600;margin-bottom:.4rem}
    .cost-value{font-size:1.4rem;font-weight:700;color:var(--primary)}
    .cost-yoy{font-size:.78rem;margin-top:.3rem;font-weight:600}
    .cost-yoy.up{color:var(--accent)}.cost-yoy.down{color:var(--success)}.cost-yoy.neutral{color:var(--text-muted)}
    .footer{text-align:center;padding:2rem;color:var(--text-muted);font-size:.85rem;border-top:1px solid var(--border);margin-top:3rem}
    @media(max-width:768px){.header{padding:1rem}.header-logo{height:40px}.header-text h1{font-size:1.15rem}.container{padding:1rem}.charts-grid{grid-template-columns:1fr}.kpi-grid{grid-template-columns:repeat(2,1fr)}.costs-grid{grid-template-columns:repeat(2,1fr)}.chart-container{height:300px}.kpi-value{font-size:1.3rem}.filter-bar{padding:.8rem 1rem}.panel-logo{max-height:55px}}
    .loading-box{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 2rem;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);color:var(--text-muted);gap:1.2rem}
    .loading-box p{font-size:1rem;font-weight:500}
    .spinner{width:48px;height:48px;border:4px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .error-box{padding:2.5rem 2rem;background:#fff5f5;border-left:4px solid var(--accent);border-radius:var(--radius-sm);box-shadow:var(--shadow);text-align:center}
    .error-box .error-title{font-size:1.1rem;font-weight:700;color:var(--accent);margin-bottom:.6rem}
    .error-box .error-msg{color:var(--text);margin-bottom:.6rem}
    .error-box .error-retry{color:var(--text-muted);font-size:.88rem}
  </style>
</head>
<body>
  <header class="header">
    <div class="header-brand">
      <img class="header-logo" id="headerLogo" alt="Grupo Aguilar Lima">
      <div class="header-text"><h1>Indicadores de Custos Variáveis - GAL</h1><p>Café · Energia · Lavanderia · Água</p></div>
    </div>
    <div class="header-actions">
      <button class="btn" id="refresh">🔄 Atualizar</button>
      <span class="updated">Atualizado: <strong id="updateTime">--:--</strong></span>
    </div>
  </header>
  <div class="filter-bar">
    <div class="filter-group"><span class="filter-label">Ano:</span><div class="year-pills" id="yearPills"></div></div>
    <div class="filter-group">
      <span class="filter-label">Período:</span>
      <select class="month-select" id="monthFrom"></select>
      <span style="color:var(--text-muted);font-size:.85rem">até</span>
      <select class="month-select" id="monthTo"></select>
      <button class="reset-link" id="resetPeriod">↺ Ano todo</button>
    </div>
  </div>
  <nav class="tabs" id="tabs"></nav>
  <main class="container" id="content"></main>
  <footer class="footer"><p>Dashboard CFO · Grupo Aguilar Lima</p></footer>

    // CSV parser: handles quoted fields, escaped quotes, CRLF
    function parseCSV(txt){
      const rows=[];let row=[],cur='',q=false;
      for(let i=0;i<txt.length;i++){
        const c=txt[i];
        if(q){
          if(c==='"'){if(txt[i+1]==='"'){cur+='"';i++}else{q=false}}
          else cur+=c;
        }else{
          if(c==='"')q=true;
          else if(c===','){row.push(cur);cur=''}
          else if(c==='\n'||c==='\r'){if(c==='\r'&&txt[i+1]==='\n')i++;row.push(cur);rows.push(row);row=[];cur=''}
          else cur+=c;
        }
      }
      if(cur.length||row.length){row.push(cur);rows.push(row)}
      return rows.filter(r=>r.some(c=>(c||'').trim()));
    }

    // Parse BR/US-formatted numbers/money. Handles: "R$ 27.969,84"→27969.84, "1.234.567,89"→1234567.89,
    // "1.234"→1234, "0.0"→0, "19027.68"→19027.68, ""→null, "-"→null, NBSP/BOM safe.
    function parseMoney(v){
      if(v===null||v===undefined)return null;
      let s=String(v).replace(/^\uFEFF/,'').trim();
      if(!s||s==='-'||s==='—'||s==='–'||s.toLowerCase()==='null'||s==='#N/A'||s==='#REF!'||s==='#DIV/0!')return null;
      // Strip currency/percent/spaces (incl. NBSP \u00A0 and zero-width \u200B)
      s=s.replace(/R\$/gi,'').replace(/[\s\u00A0\u200B]/g,'').replace(/%/g,'');
      if(!s||s==='-')return null;
      // Handle parentheses as negative (accounting: "(123,45)" = -123.45)
      let neg=false;
      if(/^\(.*\)$/.test(s)){neg=true;s=s.slice(1,-1)}
      const hasC=s.includes(','),hasD=s.includes('.');
      if(hasC&&hasD){
        // Both present: the LAST separator is the decimal; the other is thousands
        if(s.lastIndexOf(',')>s.lastIndexOf('.')){s=s.replace(/\./g,'').replace(',','.')}
        else{s=s.replace(/,/g,'')}
      }else if(hasC){
        // Only comma: BR decimal (e.g. "11,00") OR BR thousand "1,234" (rare here) — assume decimal
        s=s.replace(/,/g,'.');
      }else if(hasD){
        const dotCount=(s.match(/\./g)||[]).length;
        if(dotCount>=2){
          // Multiple dots: definitely BR thousand sep (e.g. "1.234.567")
          s=s.replace(/\./g,'');
        }else{
          // Single dot: "1.234" (BR thousand) vs "20.5" (US decimal)
          const parts=s.split('.');
          if(parts[1].length===3&&/^[1-9]\d{0,2}$/.test(parts[0])){s=parts.join('')}
          // else leave as US decimal
        }
      }
      const n=parseFloat(s);
      if(isNaN(n))return null;
      return neg?-n:n;
    }

    function mkEmpty(){return{months:ML.slice(),pax:new Array(12).fill(null),diarias:new Array(12).fill(null),cafe:new Array(12).fill(null),lavanderia:new Array(12).fill(null),agua:new Array(12).fill(null),energia:new Array(12).fill(null),total_costs:new Array(12).fill(null),cost_per_pax:new Array(12).fill(null),cost_per_day:new Array(12).fill(null)}}

    function computeDerived(h){
      for(let i=0;i<12;i++){
        const parts=[h.cafe[i],h.energia[i],h.lavanderia[i],h.agua[i]].filter(isVal);
        h.total_costs[i]=parts.length?parts.reduce((s,x)=>s+x,0):null;
        h.cost_per_pax[i]=(isVal(h.total_costs[i])&&isVal(h.pax[i])&&h.pax[i]>0)?h.total_costs[i]/h.pax[i]:null;
        h.cost_per_day[i]=(isVal(h.total_costs[i])&&isVal(h.diarias[i])&&h.diarias[i]>0)?h.total_costs[i]/h.diarias[i]:null;
      }
    }

    function buildConsolidated(hotels){
      const c=mkEmpty();
      const keys=['pax','diarias','cafe','lavanderia','agua','energia'];
      for(let i=0;i<12;i++){
        keys.forEach(k=>{
          const vals=HOTEL_KEYS.map(hk=>hotels[hk]?hotels[hk][k][i]:null).filter(isVal);
          c[k][i]=vals.length?vals.reduce((s,x)=>s+x,0):null;
        });
        const parts=[c.cafe[i],c.energia[i],c.lavanderia[i],c.agua[i]].filter(isVal);
        c.total_costs[i]=parts.length?parts.reduce((s,x)=>s+x,0):null;
        c.cost_per_pax[i]=(isVal(c.total_costs[i])&&isVal(c.pax[i])&&c.pax[i]>0)?c.total_costs[i]/c.pax[i]:null;
        c.cost_per_day[i]=(isVal(c.total_costs[i])&&isVal(c.diarias[i])&&c.diarias[i]>0)?c.total_costs[i]/c.diarias[i]:null;
      }
      return c;
    }

    function buildDataFromRecords(rows){
      if(!rows||rows.length<2)throw new Error('Planilha sem dados');
      const idx={mes:0,ano:1,empresa:2,pax:3,diarias:4,ocup:5,cafe:6,lav:7,agua:8,energia:9,metaCafe:10,metaLav:11};
      const D={},M={};
      const body=rows.slice(1);
      const setIfVal=(arr,i,v)=>{if(isVal(v))arr[i]=v};
      let stats={rows:0,skipped:0,unknownEmp:new Set(),unknownMonth:new Set()};
      body.forEach(r=>{
        if(r.length<3){stats.skipped++;return}
        const mRaw=(r[idx.mes]||'').replace(/^\uFEFF/,'').trim();
        const mIdx=matchMonth(mRaw);
        if(mIdx===undefined){if(mRaw)stats.unknownMonth.add(mRaw);stats.skipped++;return}
        const yrRaw=(r[idx.ano]||'').trim();
        const yrMatch=yrRaw.match(/\d{4}/);
        if(!yrMatch){stats.skipped++;return}
        const yr=yrMatch[0];
        const emp=(r[idx.empresa]||'').trim();
        const hotel=matchHotel(emp);
        if(!hotel){if(emp)stats.unknownEmp.add(emp);stats.skipped++;return}
        if(!D[yr])D[yr]={hotels:{}};
        if(!D[yr].hotels[hotel])D[yr].hotels[hotel]=mkEmpty();
        const h=D[yr].hotels[hotel];
        // Only overwrite if new value is non-null, so duplicate rows with empty cells don't erase good data
        setIfVal(h.pax,mIdx,parseMoney(r[idx.pax]));
        setIfVal(h.diarias,mIdx,parseMoney(r[idx.diarias]));
        setIfVal(h.cafe,mIdx,parseMoney(r[idx.cafe]));
        setIfVal(h.lavanderia,mIdx,parseMoney(r[idx.lav]));
        setIfVal(h.agua,mIdx,parseMoney(r[idx.agua]));
        setIfVal(h.energia,mIdx,parseMoney(r[idx.energia]));
        const mc=parseMoney(r[idx.metaCafe]),ml=parseMoney(r[idx.metaLav]);
        if(isVal(mc)||isVal(ml)){
          if(!M[yr])M[yr]={};
          if(!M[yr][hotel])M[yr][hotel]={cafe:new Array(12).fill(null),lavanderia:new Array(12).fill(null)};
          if(isVal(mc))M[yr][hotel].cafe[mIdx]=mc;
          if(isVal(ml))M[yr][hotel].lavanderia[mIdx]=ml;
        }
        stats.rows++;
      });
      console.info('[GAL Dashboard] Linhas processadas:',stats.rows,'| puladas:',stats.skipped,
        stats.unknownEmp.size?'| empresas desconhecidas: '+[...stats.unknownEmp].join(', '):'',
        stats.unknownMonth.size?'| meses desconhecidos: '+[...stats.unknownMonth].join(', '):'');
      Object.keys(D).forEach(yr=>{
        HOTEL_KEYS.forEach(hk=>{if(!D[yr].hotels[hk])D[yr].hotels[hk]=mkEmpty()});
        Object.values(D[yr].hotels).forEach(h=>computeDerived(h));
        D[yr].consolidated=buildConsolidated(D[yr].hotels);
      });
      Object.keys(M).forEach(yr=>{
        const cons={cafe:new Array(12).fill(null),lavanderia:new Array(12).fill(null)};
        for(let i=0;i<12;i++){
          ['cafe','lavanderia'].forEach(k=>{
            const vals=HOTEL_KEYS.map(hk=>M[yr][hk]&&M[yr][hk][k]?M[yr][hk][k][i]:null).filter(isVal);
            if(vals.length)cons[k][i]=vals.reduce((s,x)=>s+x,0)/vals.length;
          });
        }
        M[yr]._consolidado=cons;
      });
      return{DATA:D,METAS:M};
    }

    async function fetchCSVFromSheet(){
      // Try by sheet name first; fall back to gid if name-based request fails
      const urls=[SHEET_URL+'&t='+Date.now(),SHEET_URL_FALLBACK+'&t='+Date.now()];
      let lastErr=null;
      for(const u of urls){
        try{
          const res=await fetch(u,{cache:'no-store',redirect:'follow'});
          if(!res.ok){lastErr=new Error('HTTP '+res.status);continue}
          let txt=await res.text();
          if(txt.charCodeAt(0)===0xFEFF)txt=txt.slice(1);
          const head=txt.trimStart().slice(0,200).toLowerCase();
          if(head.startsWith('<!doctype')||head.startsWith('<html')||head.includes('<meta')){lastErr=new Error('HTML recebido no lugar de CSV');continue}
          return txt;
        }catch(e){lastErr=e}
      }
      throw lastErr||new Error('Falha ao buscar CSV');
    }

    let refreshTimer=null;
    async function fetchSheetData(silent=false){
      try{
        if(!silent&&!DATA)showLoading();
        let txt;
        try{txt=await fetchCSVFromSheet()}
        catch(e){throw new Error('Não foi possível ler a planilha ('+(e.message||e)+'). Verifique se o compartilhamento está como "Qualquer pessoa com o link" e se a aba "'+SHEET_NAME+'" existe.')}
        const rows=parseCSV(txt);
        console.info('[GAL Dashboard] CSV recebido — linhas:',rows.length,'| cabeçalho:',rows[0]);
        const built=buildDataFromRecords(rows);
        if(!Object.keys(built.DATA).length)throw new Error('Nenhum dado válido encontrado na aba "'+SHEET_NAME+'". Verifique se o nome da aba está correto e se as colunas A–L seguem o padrão (Mês, Ano, Empresa, Pax, Diárias, Ocupação, Café, Lavanderia, Água, Energia, Meta Café, Meta Lavanderia).');
        DATA=built.DATA;METAS=built.METAS;
        initStateFromData();
        clampP();renderAll();uTS();
        console.info('[GAL Dashboard] Dados carregados — anos:',Object.keys(DATA).join(', '));
        if(!refreshTimer)refreshTimer=setInterval(()=>fetchSheetData(true),REFRESH_INTERVAL);
      }catch(e){
        console.error('[GAL Dashboard] Erro ao buscar dados da planilha:',e);
        if(!DATA){showError(e.message||String(e));setTimeout(()=>fetchSheetData(),RETRY_INTERVAL)}
      }
    }

    document.getElementById('refresh').addEventListener('click',()=>fetchSheetData(true));
    document.getElementById('monthFrom').addEventListener('change',e=>{if(!DATA)return;S.mF=+e.target.value;if(S.mF>S.mT)S.mT=S.mF;renderMS();renderContent()});
    document.getElementById('monthTo').addEventListener('change',e=>{if(!DATA)return;S.mT=+e.target.value;if(S.mT<S.mF)S.mF=S.mT;renderMS();renderContent()});
    document.getElementById('resetPeriod').addEventListener('click',()=>{if(!DATA)return;S.mF=0;S.mT=11;clampP();renderMS();renderContent()});
    window.addEventListener('load',()=>{document.getElementById('headerLogo').src=`data:image/png;base64,${LOGOS.grupo}`;fetchSheetData()});
  </script>
